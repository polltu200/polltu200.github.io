<html>
<head>
    <meta name="viewport" content="width=device-width">
    <script src='amebo.js'></script>
    <script src='iosJSnode.js'></script>
</head>
<script>
function Gameboy_Load()
{
gameboy = new gb("PYVSE.gb",document.getElementById("gb-screen"))
var request = new XMLHttpRequest();
request.open('GET', 'PYVSE.sav', true); 
req.onreadystatechange = function (event) {
    if (req.readyState == 4) {
         if (req.status == 200)
            alert(req.responseText);
	    CRAM.set(new Uint8Array(req.responseText.slice(0, CRAM.length)));
            gameboy.scopeEval("saveBattery(); reset();")
    }
}
}
</script>
<body onload='Gameboy_Load()'>
	<canvas id="gb-screen" width="160" height="144">Not support canvas!!!</canvas>
</body>
</html>
